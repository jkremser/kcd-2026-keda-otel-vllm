# https://github.com/vllm-project/production-stack/blob/main/helm/values.yaml
servingEngineSpec:
  runtimeClassName: ""
  modelSpec:
    - name: "gemma"
      repository: "vllm/vllm-openai"
      # tag: "latest"
      tag: "v0.17.0"
      modelURL: "google/gemma-3-4b-it"
      replicaCount: 1

      requestCPU: 10
      requestMemory: "30Gi"
      requestGPU: 1
      pvcStorage: "50Gi"
      pvcAccessMode:
        - ReadWriteOnce
      # Enable KEDA autoscaling
      podAnnotations:
        sidecar.opentelemetry.io/inject: "otel-sidecar-template"
      keda:
        enabled: true
        triggers:
          - type: external
            metadata:
              scalerAddress: "keda-otel-scaler.keda.svc:4318"
              metricQuery: "sum(vllm:kv_cache_usage_perc)"
              operationOverTime: "avg"
              targetValue: ".5" # for scaling 1 -> 2
          - type: external
            metadata:
              scalerAddress: "keda-otel-scaler.keda.svc:4318"
              metricQuery: "sum(vllm:num_requests_waiting)"
              operationOverTime: "avg"
              targetValue: "30" # for scaling 2 -> 3
        minReplicaCount: 1
        maxReplicaCount: 3
        fallback:
          failureThreshold: 10
          replicas: 1
        advanced:
          horizontalPodAutoscalerConfig:
            behavior:
              scaleDown:
                # this should be higher in prod
                stabilizationWindowSeconds: 1200
              scaleUp:
                # this should be much higher in prod
                stabilizationWindowSeconds: 1
      # initContainer:
      #   name: debug
      #   image: busybox:latest
      #   args: ["sleep", "9999"]

      vllmConfig:
        # enableChunkedPrefill: false
        enablePrefixCaching: false
        maxModelLen: 3000
        # quantization: "awq"
        dtype: "half"

        extraArgs: [
          "--gpu-memory-utilization", "0.95",
          "--tensor_parallel_size", "1",
          "--dtype", "float32",
          "--enforce-eager",
        ]

      # pass this as --set arg so that it doesn't end up in git
      # hf_token: hf_**
routerSpec:
  startupProbe:
    initialDelaySeconds: 30
    failureThreshold: 120
